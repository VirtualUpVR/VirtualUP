<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VirtualUP — Gorilla Climb</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: #0a1a12; height: 100%; }
  canvas { display: block; }
  #startpage {
    position: fixed; inset: 0; z-index: 10; background: #ffffff;
    display: flex; align-items: center; justify-content: center;
  }
  #startvr {
    font: bold 28px Arial, sans-serif; color: #000; background: #fff;
    border: 2px solid #000; border-radius: 8px; padding: 18px 48px; cursor: pointer;
  }
  #startvr:active { background: #eee; }
</style>
</head>
<body>
<div id="startpage"><button id="startvr">Start VR</button></div>
<script type="text/plain" id="gamecode">
(function () {
  'use strict';

  // ---- error visibility: show real errors on screen instead of a silent crash ----
  function showError(msg) {
    let bar = document.getElementById('errbar');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'errbar';
      bar.style.cssText = 'position:fixed;left:0;right:0;top:0;z-index:99;background:#7a1020;color:#fff;' +
        'font:13px monospace;padding:8px 12px;white-space:pre-wrap;';
      document.body.appendChild(bar);
    }
    bar.textContent = 'Game error: ' + msg + '  (reload the page; check your internet if it repeats)';
  }
  window.addEventListener('error', e => showError(e.message || 'unknown script error'));
  window.addEventListener('unhandledrejection', e => showError((e.reason && e.reason.message) || 'unhandled promise'));

  // if the 3D engine failed to download (bad Wi-Fi etc.), say so instead of crashing
  if (typeof THREE === 'undefined') {
    showError('the 3D engine failed to load — check your internet connection and reload');
    return;
  }

  // ---------- renderer / scene ----------
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.xr.enabled = true;
  renderer.outputEncoding = THREE.sRGBEncoding;
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87c5e8);
  scene.fog = new THREE.Fog(0x87c5e8, 30, 170);

  const sun = new THREE.DirectionalLight(0xfff3d6, 1.0);
  sun.position.set(20, 60, 10);
  scene.add(sun);
  const hemi = new THREE.HemisphereLight(0xbfe8ff, 0x2c5232, 0.85);
  scene.add(hemi);

  const camera = new THREE.PerspectiveCamera(80, window.innerWidth / window.innerHeight, 0.05, 400);

  // player rig: everything (camera + hands) rides inside this
  const rig = new THREE.Group();
  rig.add(camera);
  scene.add(rig);

  const SPAWN = new THREE.Vector3(0, 0.02, 6);
  rig.position.copy(SPAWN);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ---------- world building ----------
  const colliders = []; // { min:Vector3, max:Vector3, top:number }
  const matRock  = new THREE.MeshLambertMaterial({ color: 0x8a7f70 });
  const matRock2 = new THREE.MeshLambertMaterial({ color: 0x77685a });
  const matMoss  = new THREE.MeshLambertMaterial({ color: 0x4d8f4a });
  const matWood  = new THREE.MeshLambertMaterial({ color: 0x8a5a33 });
  const matGold  = new THREE.MeshLambertMaterial({ color: 0xffd23f, emissive: 0x6b5200 });

  const unitBox = new THREE.BoxGeometry(1, 1, 1);
  // Static boxes are batched into one merged mesh per material — with ~1100
  // platforms across 150 levels, drawing them individually would melt the Quest.
  const staticBoxes = [];
  function addBox(x, y, z, w, h, d, mat) {
    staticBoxes.push({ x, y, z, w, h, d, mat });
    colliders.push({
      min: new THREE.Vector3(x - w / 2, y - h / 2, z - d / 2),
      max: new THREE.Vector3(x + w / 2, y + h / 2, z + d / 2)
    });
  }
  function buildStaticMeshes() {
    const sp = unitBox.attributes.position.array;
    const sn = unitBox.attributes.normal.array;
    const su = unitBox.attributes.uv.array;
    const si = unitBox.index.array;
    const byMat = new Map();
    for (const b of staticBoxes) {
      if (!byMat.has(b.mat)) byMat.set(b.mat, []);
      byMat.get(b.mat).push(b);
    }
    byMat.forEach((list, mat) => {
      const vpb = sp.length / 3; // 24 verts per box
      const pos = new Float32Array(list.length * vpb * 3);
      const nor = new Float32Array(list.length * vpb * 3);
      const uv  = new Float32Array(list.length * vpb * 2);
      const idx = new Uint32Array(list.length * si.length);
      list.forEach((b, k) => {
        // bigger boxes repeat the texture more so detail stays crisp
        const rep = Math.min(Math.max(Math.max(b.w, b.h, b.d) / 1.2, 1), 24);
        for (let v = 0; v < vpb; v++) {
          const o = (k * vpb + v) * 3;
          pos[o]     = sp[v * 3]     * b.w + b.x;
          pos[o + 1] = sp[v * 3 + 1] * b.h + b.y;
          pos[o + 2] = sp[v * 3 + 2] * b.d + b.z;
          nor[o] = sn[v * 3]; nor[o + 1] = sn[v * 3 + 1]; nor[o + 2] = sn[v * 3 + 2];
          const u = (k * vpb + v) * 2;
          uv[u] = su[v * 2] * rep; uv[u + 1] = su[v * 2 + 1] * rep;
        }
        for (let ii = 0; ii < si.length; ii++) idx[k * si.length + ii] = si[ii] + k * vpb;
      });
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      g.setAttribute('normal', new THREE.BufferAttribute(nor, 3));
      g.setAttribute('uv', new THREE.BufferAttribute(uv, 2));
      g.setIndex(new THREE.BufferAttribute(idx, 1));
      const mesh = new THREE.Mesh(g, mat);
      mesh.frustumCulled = false;
      scene.add(mesh);
    });
  }

  // jungle floor
  addBox(0, -0.5, 0, 90, 1, 90, matMoss);
  // scattered ground rocks for warming up
  addBox(3, 0.3, 3, 1.6, 0.6, 1.6, matRock);
  addBox(-3.4, 0.45, 2.2, 1.4, 0.9, 1.4, matRock2);

  const matSand  = new THREE.MeshLambertMaterial({ color: 0xc9a86a });
  const matIce   = new THREE.MeshLambertMaterial({ color: 0xdff2ff, emissive: 0x1d3340 });
  const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4526 });
  const leafMat  = new THREE.MeshLambertMaterial({ color: 0x2f7a3a });

  // deterministic "random" so the course is the same every run
  let seed = 1;
  function rnd() { seed++; return Math.abs(Math.sin(seed * 127.1 + 311.7) * 43758.5453) % 1; }

  // ============ LEVEL 1 — THE TOWER (exactly 10 bricks) ============
  const pillar = new THREE.Mesh(new THREE.CylinderGeometry(2.4, 3.2, 13, 10), matRock2);
  pillar.position.set(0, 6.5, 0);
  scene.add(pillar);
  // pillar collision is a true tapered cylinder — matches exactly what you see
  const PILLAR = { y0: 0, y1: 13, r0: 3.2, r1: 2.4 };
  function pillarRadiusAt(y) {
    const t = Math.max(0, Math.min(1, (y - PILLAR.y0) / (PILLAR.y1 - PILLAR.y0)));
    return PILLAR.r0 + (PILLAR.r1 - PILLAR.r0) * t;
  }

  let px = 0, pz = 0, py = 1.0, heading = 0;
  const pathPts = [];
  {
    let angle = 0;
    for (let i = 0; i < 10; i++) {
      px = Math.cos(angle) * 3.6;
      pz = Math.sin(angle) * 3.6;
      addBox(px, py, pz, 1.4, 0.35, 1.4, i % 2 ? matRock : matWood);
      pathPts.push({ x: px, y: py, z: pz });
      angle += 0.95;
      py += 1.15;
    }
    // tower cap — catch your breath, the floating course starts here
    addBox(0, py, 0, 4.4, 0.5, 4.4, matMoss);
    pathPts.push({ x: 0, y: py, z: 0 });
    px = 0; pz = 0; py += 0.2;
    heading = angle;
  }

  // path stepper for the floating levels — wanders across the sky
  function step(gapMin, gapMax, distMin, distMax) {
    heading += (rnd() - 0.5) * 1.5;
    const d = distMin + rnd() * (distMax - distMin);
    px += Math.cos(heading) * d;
    pz += Math.sin(heading) * d;
    py += gapMin + rnd() * (gapMax - gapMin);
    pathPts.push({ x: px, y: py, z: pz });
  }
  // stepper with a fixed turn — for zigzags, spirals and rings
  function stepTurn(turn, gapMin, gapMax, distMin, distMax) {
    heading += turn;
    const d = distMin + rnd() * (distMax - distMin);
    px += Math.cos(heading) * d;
    pz += Math.sin(heading) * d;
    py += gapMin + rnd() * (gapMax - gapMin);
    pathPts.push({ x: px, y: py, z: pz });
  }

  // ---------- moving platforms ----------
  const movers = [];
  function addMover(x, y, z, w, h, d, mat, ax, ay, az, sp, ph) {
    const mesh = new THREE.Mesh(unitBox, mat);
    mesh.position.set(x, y, z);
    mesh.scale.set(w, h, d);
    scene.add(mesh);
    const col = {
      min: new THREE.Vector3(x - w / 2, y - h / 2, z - d / 2),
      max: new THREE.Vector3(x + w / 2, y + h / 2, z + d / 2)
    };
    colliders.push(col);
    const m = { mesh, col, cx: x, cy: y, cz: z, w, h, d, ax, ay, az, sp,
                ph: (ph === undefined ? rnd() * 6.28 : ph),
                delta: new THREE.Vector3(), prev: new THREE.Vector3(x, y, z) };
    col.mover = m;
    movers.push(m);
  }
  function updateMovers(t) {
    for (const m of movers) {
      const s = Math.sin(t * m.sp + m.ph), c = Math.cos(t * m.sp + m.ph);
      const nx = m.cx + s * m.ax, ny = m.cy + s * m.ay, nz = m.cz + c * m.az;
      m.delta.set(nx - m.prev.x, ny - m.prev.y, nz - m.prev.z);
      if (m.delta.length() > 0.5) m.delta.set(0, 0, 0); // ignore first-frame jump
      m.prev.set(nx, ny, nz);
      m.mesh.position.set(nx, ny, nz);
      m.col.min.set(nx - m.w / 2, ny - m.h / 2, nz - m.d / 2);
      m.col.max.set(nx + m.w / 2, ny + m.h / 2, nz + m.d / 2);
    }
  }

  // extra materials for the upper levels
  const matMush    = new THREE.MeshLambertMaterial({ color: 0xd8433a });
  const matStem    = new THREE.MeshLambertMaterial({ color: 0xf0e6d2 });
  const matLava    = new THREE.MeshLambertMaterial({ color: 0x3a2a26, emissive: 0xff5a1f, emissiveIntensity: 0.55 });
  const matCloud   = new THREE.MeshLambertMaterial({ color: 0xf5f8ff, emissive: 0x39404d, emissiveIntensity: 0.4 });
  const matCrystal = new THREE.MeshLambertMaterial({ color: 0x7fe8e0, emissive: 0x0e5c56, emissiveIntensity: 0.7 });
  const matStorm   = new THREE.MeshLambertMaterial({ color: 0x4a4f5c });
  const matBeam2   = new THREE.MeshLambertMaterial({ color: 0x5c3d22 });
  const matStar    = new THREE.MeshLambertMaterial({ color: 0xfff1a8, emissive: 0xb08d00, emissiveIntensity: 0.8 });
  const matPink    = new THREE.MeshLambertMaterial({ color: 0xf2a9c4 });
  const matPurple  = new THREE.MeshLambertMaterial({ color: 0x8d6fd1 });
  const matCopper  = new THREE.MeshLambertMaterial({ color: 0xc57a3d });
  const matEmerald = new THREE.MeshLambertMaterial({ color: 0x2fae6e });
  const matObsidian= new THREE.MeshLambertMaterial({ color: 0x232028, emissive: 0x2d1f45, emissiveIntensity: 0.5 });
  const matSnow    = new THREE.MeshLambertMaterial({ color: 0xffffff });
  const matHoney   = new THREE.MeshLambertMaterial({ color: 0xe8b83a });
  const matCoral   = new THREE.MeshLambertMaterial({ color: 0xf07860 });
  const matMint    = new THREE.MeshLambertMaterial({ color: 0x9fe8c8 });
  const matSlate   = new THREE.MeshLambertMaterial({ color: 0x6b7b8c });
  const rainbowMats = [0xe63946, 0xf77f24, 0xffd23f, 0x57cc57, 0x35a7ff, 0x7b5be6, 0xd05ce3]
    .map(c => new THREE.MeshLambertMaterial({ color: c }));

  // ---------- procedural textures ----------
  // 16x16 pixel-art textures drawn at load, rendered with nearest-neighbor
  // filtering so every pixel stays a crisp chunky square. No image files.
  function makeTex(style) {
    const c = document.createElement('canvas');
    c.width = c.height = 16;
    const g = c.getContext('2d');
    const R = Math.random;
    const put = (x, y, v) => { v = Math.max(0, Math.min(255, v | 0)); g.fillStyle = 'rgb(' + v + ',' + v + ',' + v + ')'; g.fillRect(x, y, 1, 1); };
    for (let y = 0; y < 16; y++) {
      for (let x = 0; x < 16; x++) {
        let v;
        if (style === 'stone')        v = 200 + R() * 50;
        else if (style === 'grain')   v = 205 + Math.sin(x * 1.3) * 18 + R() * 16;
        else if (style === 'speck')   v = R() < 0.25 ? 175 + R() * 30 : 215 + R() * 40;
        else if (style === 'organic') v = R() < 0.35 ? 185 + R() * 25 : 220 + R() * 30;
        else if (style === 'facet')   v = ((x + y) % 5 < 2) ? 240 + R() * 15 : ((x - y + 32) % 7 < 1 ? 185 : 215 + R() * 20);
        else                          v = 225 + R() * 25; // soft
        put(x, y, v);
      }
    }
    if (style === 'stone') { // pixel cracks
      let x = R() * 16 | 0, y = 0;
      while (y < 16) { put(x, y, 150 + R() * 20); x += (R() < 0.5 ? -1 : 1) * (R() < 0.4 ? 1 : 0); x = (x + 16) % 16; y++; }
      for (let i = 0; i < 6; i++) put(R() * 16, R() * 16, 165);
    } else if (style === 'grain') { // dark plank seams + a knot
      const s1 = R() * 16 | 0, s2 = (s1 + 8) % 16;
      for (let y = 0; y < 16; y++) { put(s1, y, 155); put(s2, y, 160); }
      const kx = R() * 14 + 1 | 0, ky = R() * 14 + 1 | 0;
      put(kx, ky, 140); put(kx + 1, ky, 165); put(kx - 1, ky, 165); put(kx, ky + 1, 170);
    } else if (style === 'soft') { // a few lighter cloud clumps
      for (let i = 0; i < 4; i++) {
        const bx = R() * 13 | 0, by = R() * 13 | 0;
        for (let dy = 0; dy < 3; dy++) for (let dx = 0; dx < 3; dx++) put(bx + dx, by + dy, 240 + R() * 15);
      }
    }
    const tx = new THREE.CanvasTexture(c);
    tx.wrapS = tx.wrapT = THREE.RepeatWrapping;
    tx.magFilter = THREE.NearestFilter;   // chunky pixels, no smoothing
    tx.minFilter = THREE.NearestFilter;
    tx.generateMipmaps = false;
    return tx;
  }
  {
    const texStone = makeTex('stone'), texGrain = makeTex('grain'), texSpeck = makeTex('speck');
    const texOrganic = makeTex('organic'), texFacet = makeTex('facet'), texSoft = makeTex('soft');
    const applyTex = (mats, tex) => mats.forEach(m => { m.map = tex; m.needsUpdate = true; });
    applyTex([matRock, matRock2, matStorm, matSlate, matObsidian], texStone);
    applyTex([matWood, matBeam2, trunkMat], texGrain);
    applyTex([matSand, matHoney, matCopper], texSpeck);
    applyTex([matMoss, leafMat, matEmerald, matMint], texOrganic);
    applyTex([matIce, matCrystal, matStar, matGold, matSnow], texFacet);
    applyTex([matMush, matStem, matCloud, matPink, matPurple, matCoral].concat(rainbowMats), texSoft);
  }

  // ============ THE JUNGLE LEVELS (1–14, unchanged) ============
  const LEVELS = [
    { k: 'slab',     m: [matRock, matRock2] },     // 1  Floating Rocks
    { k: 'beam',     m: [matWood], bt: 0.5 },      // 2  Wooden Beams
    { k: 'tree',     cm: leafMat },                // 3  Sky Canopy
    { k: 'stairs',   m: [matSand] },               // 4  Sandstone Stairs
    { k: 'column',   m: [matSand] },               // 5  Sky Ruins
    { k: 'zigzag',   m: [matIce] },                // 6  Ice Switchbacks
    { k: 'mushroom', cm: matMush },                // 7  Mushroom Hop
    { k: 'pairs',    m: [matMoss] },               // 8  Twin Gardens
    { k: 'moveH',    m: [matCloud] },              // 9  Drifting Clouds — first movers
    { k: 'spiral',   m: [matWood] },               // 10 Spiral Scaffold
    { k: 'slab',     m: [matLava] },               // 11 Ember Stones
    { k: 'ring',     m: [matCrystal] },            // 12 Crystal Ring
    { k: 'longjump', m: [matCloud] },              // 13 Big Air
    { k: 'moveV',    m: [matCopper] }               // 14 Copper Elevators — then the ship
  ];

  // ---------- the spaceship + the second map ----------
  // After level 14 (the elevators), a ship waits. Step inside and you're
  // flown to THE SPACE MAP — a totally separate island 2km away where
  // levels 15–55 live. The jungle map keeps everything below.
  let inSpace = false, teleported = false;
  let shipTrigger = null;
  const SPACE_SPAWN = new THREE.Vector3(2000, 30.26, 0.8);

  function buildSpaceport() {
    // landing pad at the end of the jungle climb
    step(0.9, 1.0, 1.2, 1.5);
    addBox(px, py, pz, 3.6, 0.5, 3.6, matSlate);
    const fy = py + 0.25;
    // the ship: a hull with an open door facing the pad
    addBox(px, fy + 0.1, pz, 2.0, 0.2, 2.6, matSlate);         // floor
    addBox(px, fy + 2.2, pz, 2.0, 0.2, 2.6, matSlate);         // roof
    addBox(px - 1.1, fy + 1.2, pz, 0.2, 2.0, 2.6, matSlate);   // left wall
    addBox(px + 1.1, fy + 1.2, pz, 0.2, 2.0, 2.6, matSlate);   // right wall
    addBox(px, fy + 1.2, pz + 1.3, 2.0, 2.0, 0.2, matSlate);   // back wall — the front is the open door
    // glowing window strips + nose cone (decor)
    const win1 = new THREE.Mesh(unitBox, matCrystal);
    win1.position.set(px - 1.16, fy + 1.5, pz); win1.scale.set(0.08, 0.3, 1.8);
    win1.updateMatrix(); win1.matrixAutoUpdate = false;
    const win2 = new THREE.Mesh(unitBox, matCrystal);
    win2.position.set(px + 1.16, fy + 1.5, pz); win2.scale.set(0.08, 0.3, 1.8);
    win2.updateMatrix(); win2.matrixAutoUpdate = false;
    const nose = new THREE.Mesh(new THREE.ConeGeometry(1.1, 1.6, 8), matCoral);
    nose.position.set(px, fy + 3.1, pz);
    nose.updateMatrix(); nose.matrixAutoUpdate = false;
    scene.add(win1, win2, nose);
    // walk inside — head in this volume launches the ship
    shipTrigger = {
      min: new THREE.Vector3(px - 0.9, fy + 0.2, pz - 1.05),
      max: new THREE.Vector3(px + 0.9, fy + 2.0, pz + 1.15)
    };

    // ---- THE SPACE MAP starts here: 2km away, its own little world ----
    px = 2000; pz = 0; py = 30; heading = rnd() * 6.28;
    addBox(px, py, pz, 4.2, 0.5, 4.2, matObsidian); // arrival pad
    pathPts.push({ x: px, y: py, z: pz });
    // the ship that brought you, parked at the pad's edge — SOLID now, but
    // purely decorative: you can land on it, and it never teleports you anywhere
    addBox(px, py + 1.4, pz - 2.9, 2.0, 2.2, 2.4, matSlate); // hull with collision
    const nose2 = new THREE.Mesh(new THREE.ConeGeometry(1.1, 1.6, 8), matCoral);
    nose2.position.set(px, py + 3.3, pz - 2.9);
    nose2.updateMatrix(); nose2.matrixAutoUpdate = false;
    scene.add(nose2);
    // invisible collider for the nose cone (kept smaller than the cone so no phantom edges)
    colliders.push({
      min: new THREE.Vector3(px - 0.6, py + 2.5, pz - 3.5),
      max: new THREE.Vector3(px + 0.6, py + 3.7, pz - 2.3)
    });
    py += 1.2;
  }

  for (let z = 0; z < LEVELS.length; z++) {
    const L = LEVELS[z];
    const t = Math.min(z / 20, 1);                     // 0 easy → 1 max difficulty
    const g0 = 1.1 + t * 0.3,  g1 = 1.5 + t * 0.4;     // climbs up to [1.4, 1.9]
    const d0 = 1.0 + t * 0.2,  d1 = 1.8 + t * 0.3;     // jumps up to [1.2, 2.1]
    const sMax = 1.3 - t * 0.55, sMin = sMax - 0.15;   // platforms shrink to ~0.75
    const S = () => sMin + rnd() * (sMax - sMin);
    const pick = i => L.m[i % L.m.length];

    if (L.k === 'slab') {
      for (let i = 0; i < 6; i++) { step(g0, g1, d0, d1); const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
    } else if (L.k === 'rainbow') {
      for (let i = 0; i < 7; i++) { step(g0, g1, d0, d1); const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
    } else if (L.k === 'beam') {
      for (let i = 0; i < 6; i++) {
        step(g0, g1, d0, d1);
        const along = i % 2 === 0;
        addBox(px, py, pz, along ? 2.4 : L.bt, 0.25, along ? L.bt : 2.4, pick(i));
      }
    } else if (L.k === 'tree') {
      for (let i = 0; i < 6; i++) {
        step(g0, g1, d0, d1);
        const s = Math.max(S(), 0.8);
        const crown = new THREE.Mesh(new THREE.ConeGeometry(s * 1.4, 2.4, 7), L.cm);
        crown.position.set(px, py - 1.1, pz);
        crown.updateMatrix(); crown.matrixAutoUpdate = false;
        scene.add(crown);
        addBox(px, py, pz, s, 0.3, s, L.cm);
      }
    } else if (L.k === 'column') {
      for (let i = 0; i < 6; i++) {
        step(g0, g1, d0, d1);
        if (i % 3 === 2) {
          addBox(px, py + 1.0, pz, 0.8, 2.4, 0.8, pick(0)); // climb its side, stand on top
          py += 2.2;
          pathPts.push({ x: px, y: py, z: pz });
        } else { const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
      }
    } else if (L.k === 'mushroom') {
      for (let i = 0; i < 6; i++) {
        step(g0, g1, d0, d1);
        const s = S();
        const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.24, 1.6, 6), matStem);
        stem.position.set(px, py - 1.0, pz);
        stem.updateMatrix(); stem.matrixAutoUpdate = false;
        scene.add(stem);
        addBox(px, py, pz, s, 0.35, s, L.cm);
      }
    } else if (L.k === 'stairs') { // a quick, kind breather — small tight steps
      for (let i = 0; i < 10; i++) { stepTurn((rnd() - 0.5) * 0.5, 0.5, 0.65, 0.6, 0.8); addBox(px, py, pz, 0.9, 0.3, 0.9, pick(i)); }
    } else if (L.k === 'zigzag') { // hard switchbacks — the path snaps left-right
      for (let i = 0; i < 7; i++) { stepTurn(i % 2 === 0 ? 1.4 : -1.4, g0, g1, d0, d1); const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
    } else if (L.k === 'spiral') { // a tight corkscrew staircase in the sky
      for (let i = 0; i < 9; i++) { stepTurn(0.85, 0.85, 1.05, 1.1, 1.3); const s = Math.max(S() - 0.1, 0.6); addBox(px, py, pz, s, 0.3, s, pick(i)); }
    } else if (L.k === 'ring') { // a wide arc — swing around the curve
      for (let i = 0; i < 8; i++) { stepTurn(0.4, 1.0, 1.25, 1.5, 1.7); const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
    } else if (L.k === 'longjump') { // few platforms, huge horizontal leaps, gentle rises
      for (let i = 0; i < 5; i++) { step(0.8, 1.1, 2.0, 2.4); const s = Math.max(S(), 0.95); addBox(px, py, pz, s, 0.35, s, pick(i)); }
    } else if (L.k === 'tiny') { // dinner-plate platforms, but mercifully close together
      for (let i = 0; i < 8; i++) { step(1.0, 1.2, 0.9, 1.2); addBox(px, py, pz, 0.55, 0.3, 0.55, pick(i)); }
    } else if (L.k === 'bridge') { // long narrow tightropes, axis-aligned
      for (let j = 0; j < 3; j++) {
        heading += (rnd() - 0.5) * 1.2;
        const alongX = Math.abs(Math.cos(heading)) > Math.abs(Math.sin(heading));
        const sgn = (alongX ? Math.cos(heading) : Math.sin(heading)) >= 0 ? 1 : -1;
        const len = 5.5;
        py += 0.7;
        addBox(px + (alongX ? sgn * len / 2 : 0), py, pz + (alongX ? 0 : sgn * len / 2),
               alongX ? len : 0.45, 0.3, alongX ? 0.45 : len, pick(j));
        px += alongX ? sgn * len : 0;
        pz += alongX ? 0 : sgn * len;
        pathPts.push({ x: px, y: py, z: pz });
      }
    } else if (L.k === 'wall') { // vault a series of tall walls
      for (let i = 0; i < 4; i++) {
        step(0.5, 0.7, 1.4, 1.7);
        const alongX = Math.abs(Math.cos(heading)) > Math.abs(Math.sin(heading));
        addBox(px, py + 1.1, pz, alongX ? 0.5 : 1.8, 2.2, alongX ? 1.8 : 0.5, pick(i));
        py += 2.4;
        pathPts.push({ x: px, y: py, z: pz });
      }
    } else if (L.k === 'moveH') { // platforms sliding side to side
      for (let i = 0; i < 6; i++) {
        step(g0, Math.min(g1, 1.6), d0, d1);
        const s = Math.max(S(), 0.9);
        addMover(px, py, pz, s, 0.35, s, pick(i), 1.1, 0, 0, 0.7 + rnd() * 0.5);
      }
    } else if (L.k === 'moveV') { // elevators bobbing up and down — time your grab
      for (let i = 0; i < 6; i++) {
        step(0.9, 1.2, d0, Math.min(d1, 1.8));
        const s = Math.max(S(), 0.9);
        addMover(px, py, pz, s, 0.35, s, pick(i), 0, 0.7, 0, 0.8 + rnd() * 0.4);
      }
    } else if (L.k === 'orbit') { // platforms circling in the air
      for (let i = 0; i < 6; i++) {
        step(g0, Math.min(g1, 1.6), d0, Math.min(d1, 1.8));
        const s = Math.max(S(), 0.9);
        addMover(px, py, pz, s, 0.35, s, pick(i), 0.9, 0, 0.9, 0.55 + rnd() * 0.35);
      }
    } else if (L.k === 'machine') { // every platform moves a different way
      for (let i = 0; i < 7; i++) {
        step(1.0, 1.4, 1.1, 1.7);
        const s = Math.max(S(), 0.85);
        const mode = i % 3;
        if (mode === 0)      addMover(px, py, pz, s, 0.35, s, pick(i), 1.0, 0, 0, 0.8 + rnd() * 0.4);
        else if (mode === 1) addMover(px, py, pz, s, 0.35, s, pick(i), 0, 0.6, 0, 0.9 + rnd() * 0.4);
        else                 addMover(px, py, pz, s, 0.35, s, pick(i), 0.8, 0, 0.8, 0.6 + rnd() * 0.3);
      }
    } else if (L.k === 'gauntlet') { // a bit of everything, tiny and far
      for (let i = 0; i < 9; i++) {
        if (i % 3 === 0) { step(0.8, 1.1, 1.9, 2.2); addBox(px, py, pz, 0.95, 0.35, 0.95, pick(i)); }
        else if (i % 3 === 1) { step(1.2, 1.5, 1.0, 1.3); addBox(px, py, pz, 0.55, 0.3, 0.55, pick(i)); }
        else { stepTurn(i % 2 === 0 ? 1.3 : -1.3, 1.2, 1.5, 1.2, 1.6); const s = S(); addBox(px, py, pz, s, 0.35, s, pick(i)); }
      }
    }

    // a wider rest platform between levels — earn your breather
    step(1.1, 1.3, 1.0, 1.5);
    addBox(px, py, pz, 2.0, 0.45, 2.0, matMoss);
  }

  // levels 1–14 done — board the ship, then 136 unique space levels await
  buildSpaceport();
  buildSpaceLevels();

  // ============ THE SPACE LEVELS: 136, ALL STRUCTURALLY UNIQUE ============
  // 35 genuinely different mechanics below. Each space level is a unique PAIR of
  // two different mechanics (no pair ever repeats), plus 6 one-off signature
  // levels. Different shapes, different moves, different routes — not palette swaps.
  function buildSpaceLevels() {
    const snapAxis = () => Math.abs(Math.cos(heading)) > Math.abs(Math.sin(heading));
    const snapSign = ax => ((ax ? Math.cos(heading) : Math.sin(heading)) >= 0 ? 1 : -1);
    const mark = () => pathPts.push({ x: px, y: py, z: pz });

    const SEG = [
      function hop(m, t) { // plain jumps
        for (let i = 0; i < 3; i++) { step(1.1 + t * 0.3, 1.5 + t * 0.35, 1.0 + t * 0.2, 1.8 + t * 0.3); const s = 1.15 - t * 0.4; addBox(px, py, pz, s, 0.35, s, m); }
      },
      function planks(m, t) { // alternating thin beams
        for (let i = 0; i < 3; i++) { step(1.1 + t * 0.25, 1.5 + t * 0.3, 1.1, 1.9); const a = i % 2 === 0; const bt = 0.5 - t * 0.15; addBox(px, py, pz, a ? 2.4 : bt, 0.25, a ? bt : 2.4, m); }
      },
      function crowns(m, t) { // treetop hops with cone canopies
        for (let i = 0; i < 3; i++) {
          step(1.2, 1.6, 1.2, 1.9);
          const s = Math.max(1.05 - t * 0.25, 0.8);
          const crown = new THREE.Mesh(new THREE.ConeGeometry(s * 1.4, 2.4, 7), m);
          crown.position.set(px, py - 1.1, pz); crown.updateMatrix(); crown.matrixAutoUpdate = false;
          scene.add(crown);
          addBox(px, py, pz, s, 0.3, s, m);
        }
      },
      function columnClimb(m, t) { // slab → tall wall-climb column → slab
        step(1.1, 1.4, 1.1, 1.7); addBox(px, py, pz, 1.0, 0.35, 1.0, m);
        step(1.2, 1.5, 1.1, 1.6); addBox(px, py + 1.0, pz, 0.8, 2.4, 0.8, m); py += 2.2; mark();
        step(1.0, 1.3, 1.1, 1.6); addBox(px, py, pz, 1.0, 0.35, 1.0, m);
      },
      function shrooms(m, t) { // caps on stems
        for (let i = 0; i < 3; i++) {
          step(1.2, 1.6, 1.1, 1.8);
          const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.24, 1.6, 6), matStem);
          stem.position.set(px, py - 1.0, pz); stem.updateMatrix(); stem.matrixAutoUpdate = false;
          scene.add(stem);
          addBox(px, py, pz, 1.0 - t * 0.25, 0.35, 1.0 - t * 0.25, m);
        }
      },
      function zig(m, t) { // hard switchbacks
        for (let i = 0; i < 4; i++) { stepTurn(i % 2 === 0 ? 1.4 : -1.4, 1.15, 1.5 + t * 0.3, 1.1, 1.9); const s = 1.0 - t * 0.3; addBox(px, py, pz, s, 0.35, s, m); }
      },
      function cork(m, t) { // tight corkscrew stairs
        for (let i = 0; i < 5; i++) { stepTurn(0.85, 0.85, 1.05, 1.1, 1.3); addBox(px, py, pz, 0.75 - t * 0.1, 0.3, 0.75 - t * 0.1, m); }
      },
      function arc(m, t) { // wide curving ring
        for (let i = 0; i < 4; i++) { stepTurn(0.4, 1.0, 1.25, 1.5, 1.7); const s = 1.0 - t * 0.25; addBox(px, py, pz, s, 0.35, s, m); }
      },
      function leaps(m, t) { // huge horizontal jumps, gentle rise
        for (let i = 0; i < 2; i++) { step(0.8, 1.1, 2.0, 2.4); addBox(px, py, pz, 1.0, 0.35, 1.0, m); }
      },
      function pebbles(m, t) { // tiny platforms, close together
        for (let i = 0; i < 4; i++) { step(1.0, 1.2, 0.9, 1.2); addBox(px, py, pz, 0.55, 0.3, 0.55, m); }
      },
      function rope(m, t) { // one long tightrope
        heading += (rnd() - 0.5) * 1.0;
        const ax = snapAxis(), sg = snapSign(ax), L = 5.5;
        py += 0.7;
        addBox(px + (ax ? sg * L / 2 : 0), py, pz + (ax ? 0 : sg * L / 2), ax ? L : 0.42, 0.3, ax ? 0.42 : L, m);
        px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
      },
      function vault(m, t) { // walls to climb over
        for (let i = 0; i < 2; i++) {
          step(0.5, 0.7, 1.4, 1.7);
          const ax = snapAxis();
          addBox(px, py + 1.1, pz, ax ? 0.5 : 1.8, 2.2, ax ? 1.8 : 0.5, m);
          py += 2.4; mark();
        }
      },
      function sliders(m, t) { // side-to-side movers
        for (let i = 0; i < 3; i++) { step(1.1, 1.5, 1.1, 1.8); addMover(px, py, pz, 1.0, 0.35, 1.0, m, 1.1, 0, 0, 0.7 + rnd() * 0.5); }
      },
      function lifts(m, t) { // bobbing elevators
        for (let i = 0; i < 3; i++) { step(0.9, 1.2, 1.1, 1.7); addMover(px, py, pz, 1.0, 0.35, 1.0, m, 0, 0.7, 0, 0.8 + rnd() * 0.4); }
      },
      function carousel(m, t) { // circling movers
        for (let i = 0; i < 3; i++) { step(1.1, 1.5, 1.1, 1.7); addMover(px, py, pz, 1.0, 0.35, 1.0, m, 0.9, 0, 0.9, 0.55 + rnd() * 0.35); }
      },
      function monkeyBars(m, t) { // swing hand-over-hand UNDER the bars
        const baseY = py;
        for (let i = 0; i < 4; i++) {
          heading += (rnd() - 0.5) * 0.5;
          px += Math.cos(heading) * 1.05; pz += Math.sin(heading) * 1.05;
          addBox(px, baseY + 2.15, pz, 0.7, 0.18, 0.7, m);
        }
        heading += (rnd() - 0.5) * 0.5;
        px += Math.cos(heading) * 1.2; pz += Math.sin(heading) * 1.2;
        py = baseY + 0.9;
        addBox(px, py, pz, 1.1, 0.35, 1.1, m); mark();
      },
      function chimney(m, t) { // climb UP between two facing walls
        step(0.8, 1.0, 1.2, 1.5);
        addBox(px, py, pz, 1.5, 0.4, 1.5, m); // base you stand on
        const ax = snapAxis(), H = 3.0;
        if (ax) { addBox(px, py + H / 2 + 0.4, pz - 0.72, 1.5, H, 0.28, m); addBox(px, py + H / 2 + 0.4, pz + 0.72, 1.5, H, 0.28, m); }
        else    { addBox(px - 0.72, py + H / 2 + 0.4, pz, 0.28, H, 1.5, m); addBox(px + 0.72, py + H / 2 + 0.4, pz, 0.28, H, 1.5, m); }
        py += H + 0.55; mark(); // top out on the wall rims
      },
      function pyramid(m, t) { // climb a stacked monument
        step(0.8, 1.0, 1.4, 1.7);
        const w = [3.2, 2.4, 1.6, 0.8];
        for (let i = 0; i < 4; i++) addBox(px, py + 0.4 + i * 0.8, pz, w[i], 0.8, w[i], m);
        py += 3.4; mark();
      },
      function pegPole(m, t) { // spiral of pegs up a pole
        step(0.8, 1.0, 1.2, 1.5);
        addBox(px, py + 2.0, pz, 0.55, 4.2, 0.55, m);
        for (let i = 0; i < 4; i++) {
          const a = i * 1.6;
          addBox(px + Math.cos(a) * 0.48, py + 0.6 + i * 0.95, pz + Math.sin(a) * 0.48, 0.32, 0.26, 0.32, m);
        }
        py += 4.3; mark(); // stand on the pole top
      },
      function pistons(m, t) { // opposite-phase pumping pairs
        for (let i = 0; i < 3; i++) {
          step(0.8, 1.0, 1.1, 1.4);
          const pxp = -Math.sin(heading), pzp = Math.cos(heading);
          addMover(px + pxp * 0.62, py, pz + pzp * 0.62, 0.8, 0.4, 0.8, m, 0, 0.9, 0, 1.0, 0);
          addMover(px - pxp * 0.62, py, pz - pzp * 0.62, 0.8, 0.4, 0.8, m, 0, 0.9, 0, 1.0, Math.PI);
        }
      },
      function snakeWalk(m, t) { // winding narrow catwalk
        for (let i = 0; i < 6; i++) { stepTurn(i % 2 ? 0.55 : -0.55, 0.25, 0.35, 1.0, 1.2); addBox(px, py, pz, 0.6, 0.3, 1.3, m); }
      },
      function halfpipe(m, t) { // travel inside a walled channel
        heading += (rnd() - 0.5) * 1.0;
        const ax = snapAxis(), sg = snapSign(ax), L = 4;
        py += 0.6;
        const cx2 = px + (ax ? sg * L / 2 : 0), cz2 = pz + (ax ? 0 : sg * L / 2);
        addBox(cx2, py, cz2, ax ? L : 1.3, 0.3, ax ? 1.3 : L, m);
        addBox(cx2 + (ax ? 0 : 0.75), py + 0.85, cz2 + (ax ? 0.75 : 0), ax ? L : 0.25, 1.4, ax ? 0.25 : L, m);
        addBox(cx2 - (ax ? 0 : 0.75), py + 0.85, cz2 - (ax ? 0.75 : 0), ax ? L : 0.25, 1.4, ax ? 0.25 : L, m);
        px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
      },
      function arches(m, t) { // hop the lintels of stone gateways
        for (let i = 0; i < 3; i++) {
          step(0.6, 0.8, 1.4, 1.7);
          const ax = snapAxis();
          addBox(px, py + 1.3, pz, ax ? 0.5 : 2.2, 0.4, ax ? 2.2 : 0.5, m); // lintel = the platform
          addBox(px + (ax ? 0 : -0.85), py + 0.55, pz + (ax ? -0.85 : 0), 0.4, 1.1, 0.4, m);
          addBox(px + (ax ? 0 : 0.85),  py + 0.55, pz + (ax ? 0.85 : 0),  0.4, 1.1, 0.4, m);
          py += 1.5; mark();
        }
      },
      function windowWall(m, t) { // climb through a hole in a wall
        step(0.7, 0.9, 1.3, 1.6);
        const ax = snapAxis(), W = 2.4;
        addBox(px, py + 0.6, pz, ax ? 0.4 : W, 1.2, ax ? W : 0.4, m);  // sill — climb onto it
        addBox(px, py + 2.6, pz, ax ? 0.4 : W, 1.0, ax ? W : 0.4, m);  // header — duck through the gap
        py += 1.4; mark();
      },
      function cluster(m, t) { // a 3D blob of boxes — find your route
        const bx = px, by = py, bz = pz;
        for (let i = 0; i < 3; i++) { step(0.9, 1.1, 0.9, 1.2); addBox(px, py, pz, 0.7, 0.6, 0.7, m); }
        for (let i = 0; i < 4; i++) addBox(bx + (rnd() - 0.5) * 4, by + rnd() * (py - by + 1), bz + (rnd() - 0.5) * 4, 0.5 + rnd() * 0.5, 0.5 + rnd() * 0.5, 0.5 + rnd() * 0.5, m);
      },
      function rooftops(m, t) { // big roofs with parapets to hop over
        for (let i = 0; i < 2; i++) {
          step(0.9, 1.1, 2.0, 2.3);
          addBox(px, py, pz, 2.6, 0.4, 2.6, m);
          addBox(px - 1.25, py + 0.45, pz, 0.12, 0.5, 2.6, m);
          addBox(px + 1.25, py + 0.45, pz, 0.12, 0.5, 2.6, m);
        }
      },
      function towerHop(m, t) { // land on capped mini-towers
        for (let i = 0; i < 3; i++) {
          step(0.9, 1.2, 1.2, 1.6);
          addBox(px, py - 0.7, pz, 1.0, 1.2, 1.0, m);
          addBox(px, py + 0.15, pz, 0.65, 0.5, 0.65, m);
        }
      },
      function jenga(m, t) { // crooked criss-cross stack to scale
        step(0.7, 0.9, 1.3, 1.6);
        for (let i = 0; i < 5; i++) {
          const ax = i % 2 === 0;
          addBox(px + (rnd() - 0.5) * 0.5, py + 0.5, pz + (rnd() - 0.5) * 0.5, ax ? 2.2 : 0.7, 0.45, ax ? 0.7 : 2.2, m);
          py += 0.55;
        }
        mark();
      },
      function ferry(m, t) { // ride a sliding island across a huge gap
        step(0.6, 0.8, 1.2, 1.4);
        addBox(px, py, pz, 1.4, 0.4, 1.4, m); // dock
        heading += (rnd() - 0.5) * 0.8;
        const ax = snapAxis(), sg = snapSign(ax), GAP = 5.2;
        addMover(px + (ax ? sg * GAP / 2 : 0), py + 0.5, pz + (ax ? 0 : sg * GAP / 2), 1.7, 0.4, 1.7, m, ax ? 2.1 : 0, 0, ax ? 0 : 2.1, 0.4);
        px += ax ? sg * GAP : 0; pz += ax ? 0 : sg * GAP; py += 1.1;
        addBox(px, py, pz, 1.4, 0.4, 1.4, m); mark(); // far dock
      },
      function bobOrbit(m, t) { // movers that circle AND bob
        for (let i = 0; i < 2; i++) { step(0.9, 1.2, 1.3, 1.6); addMover(px, py, pz, 1.0, 0.35, 1.0, m, 0.8, 0.5, 0.8, 0.6); }
      },
      function narrows(m, t) { // beams that keep getting thinner
        const w = [0.5, 0.38, 0.26];
        for (let i = 0; i < 3; i++) {
          step(0.6, 0.8, 1.2, 1.5);
          const ax = i % 2 === 0;
          addBox(px, py, pz, ax ? 2.6 : w[i], 0.25, ax ? w[i] : 2.6, m);
        }
      },
      function overhang(m, t) { // swing out around a lip above you
        step(1.0, 1.3, 1.2, 1.6);
        addBox(px, py, pz, 1.3, 0.35, 1.3, m);
        px += Math.cos(heading) * 0.5; pz += Math.sin(heading) * 0.5;
        addBox(px, py + 2.0, pz, 1.9, 0.35, 1.9, m); // the lip — get on top of it
        py += 2.2; mark();
      },
      function checkers(m, t) { // flat scatter field — pick a route across
        py += 1.0;
        for (let i = 0; i < 5; i++) { heading += (rnd() - 0.5) * 1.8; px += Math.cos(heading) * 1.3; pz += Math.sin(heading) * 1.3; addBox(px, py, pz, 0.8, 0.3, 0.8, m); }
        mark();
      },
      function panes(m, t) { // vault thin tall glass panes
        for (let i = 0; i < 3; i++) {
          step(0.5, 0.7, 1.2, 1.5);
          const ax = snapAxis();
          addBox(px, py + 0.8, pz, ax ? 0.12 : 1.8, 1.6, ax ? 1.8 : 0.12, m);
          py += 1.8; mark();
        }
      },
      function weave(m, t) { // twin rails with blockers — switch sides
        heading += (rnd() - 0.5) * 0.8;
        const ax = snapAxis(), sg = snapSign(ax), L = 6;
        py += 0.7;
        const cx2 = px + (ax ? sg * L / 2 : 0), cz2 = pz + (ax ? 0 : sg * L / 2);
        addBox(cx2 + (ax ? 0 : 0.55), py, cz2 + (ax ? 0.55 : 0), ax ? L : 0.4, 0.3, ax ? 0.4 : L, m);
        addBox(cx2 - (ax ? 0 : 0.55), py, cz2 - (ax ? 0.55 : 0), ax ? L : 0.4, 0.3, ax ? 0.4 : L, m);
        addBox(cx2 + (ax ? -sg : 0.55) * (ax ? L / 6 : 1) + (ax ? 0 : 0), py + 0.55, cz2 + (ax ? 0.55 : -sg * L / 6), 0.5, 0.8, 0.5, m); // blocker rail A
        addBox(cx2 + (ax ? sg * L / 6 : -0.55), py + 0.55, cz2 + (ax ? -0.55 : sg * L / 6), 0.5, 0.8, 0.5, m);                            // blocker rail B
        px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
      },
      // ---- 15 newer mechanics ----
      function descent(m, t) { // Only DOWN for a moment — then a pegged riser
        for (let i = 0; i < 3; i++) { step(-1.4, -1.0, 1.2, 1.6); addBox(px, py, pz, 1.0, 0.35, 1.0, m); }
        step(0.6, 0.8, 1.2, 1.5);
        addBox(px, py + 2.6, pz, 0.55, 5.4, 0.55, m);
        for (let i = 0; i < 5; i++) {
          const a = i * 1.5;
          addBox(px + Math.cos(a) * 0.48, py + 0.6 + i * 1.0, pz + Math.sin(a) * 0.48, 0.32, 0.24, 0.32, m);
        }
        py += 5.5; mark();
      },
      function gates(m, t) { // sliding door pairs — pass when they open
        for (let i = 0; i < 2; i++) {
          heading += (rnd() - 0.5) * 0.8;
          const ax = snapAxis(), sg = snapSign(ax), L = 3.2;
          py += 0.5;
          const cx2 = px + (ax ? sg * L / 2 : 0), cz2 = pz + (ax ? 0 : sg * L / 2);
          addBox(cx2, py, cz2, ax ? L : 0.9, 0.3, ax ? 0.9 : L, m);
          const pX = ax ? 0 : 1, pZ = ax ? 1 : 0;
          addMover(cx2 + pX * 0.9, py + 1.35, cz2 + pZ * 0.9, ax ? 0.3 : 1.2, 2.2, ax ? 1.2 : 0.3, m, pX * 0.85, 0, pZ * 0.85, 0.9, 0);
          addMover(cx2 - pX * 0.9, py + 1.35, cz2 - pZ * 0.9, ax ? 0.3 : 1.2, 2.2, ax ? 1.2 : 0.3, m, pX * 0.85, 0, pZ * 0.85, 0.9, Math.PI);
          px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
        }
      },
      function stepper(m, t) { // a rippling wave escalator of lifts
        step(0.6, 0.8, 1.2, 1.5); addBox(px, py, pz, 1.2, 0.35, 1.2, m);
        for (let i = 0; i < 5; i++) {
          step(0.55, 0.7, 1.0, 1.2);
          addMover(px, py, pz, 0.9, 0.35, 0.9, m, 0, 0.55, 0, 1.4, i * 0.9);
        }
      },
      function funnel(m, t) { // a spiral that keeps tightening inward
        for (let i = 0; i < 6; i++) {
          stepTurn(1.0 + i * 0.12, 0.7, 0.9, Math.max(1.3 - i * 0.12, 0.7), Math.max(1.4 - i * 0.12, 0.8));
          const s = 0.9 - i * 0.08;
          addBox(px, py, pz, s, 0.3, s, m);
        }
      },
      function outposts(m, t) { // wall-vault, then a huge leap, twice
        for (let i = 0; i < 2; i++) {
          step(0.5, 0.7, 1.4, 1.7);
          const ax = snapAxis();
          addBox(px, py + 1.1, pz, ax ? 0.5 : 1.6, 2.2, ax ? 1.6 : 0.5, m);
          py += 2.4; mark();
          step(0.7, 0.9, 1.9, 2.2);
          addBox(px, py, pz, 1.0, 0.35, 1.0, m);
        }
      },
      function transfer(m, t) { // ferry ride straight onto a rising lift
        step(0.6, 0.8, 1.2, 1.4); addBox(px, py, pz, 1.3, 0.4, 1.3, m);
        heading += (rnd() - 0.5) * 0.8;
        const ax = snapAxis(), sg = snapSign(ax), GAP = 4.2;
        addMover(px + (ax ? sg * GAP / 2 : 0), py + 0.5, pz + (ax ? 0 : sg * GAP / 2), 1.5, 0.4, 1.5, m, ax ? 1.6 : 0, 0, ax ? 0 : 1.6, 0.5);
        px += ax ? sg * GAP : 0; pz += ax ? 0 : sg * GAP; mark();
        addMover(px, py + 2.2, pz, 1.0, 0.35, 1.0, m, 0, 1.4, 0, 0.6);
        py += 4.2; mark();
        step(0.1, 0.3, 1.2, 1.4); addBox(px, py, pz, 1.2, 0.35, 1.2, m);
      },
      function crownRing(m, t) { // a rising ring of platforms around a void
        step(0.7, 0.9, 1.3, 1.5); addBox(px, py, pz, 1.0, 0.35, 1.0, m);
        const cxx = px + Math.cos(heading) * 1.9, czz = pz + Math.sin(heading) * 1.9;
        const baseY = py + 0.6;
        let la = 0;
        for (let i = 0; i < 6; i++) {
          la = heading + Math.PI + (i + 1) * (Math.PI * 2 / 7);
          addBox(cxx + Math.cos(la) * 1.9, baseY + i * 0.45, czz + Math.sin(la) * 1.9, 0.8, 0.3, 0.8, m);
        }
        px = cxx + Math.cos(la) * 1.9; pz = czz + Math.sin(la) * 1.9; py = baseY + 5 * 0.45; mark();
      },
      function ladder(m, t) { // a proper rung ladder up a wall
        step(0.7, 0.9, 1.2, 1.5); addBox(px, py, pz, 1.4, 0.35, 1.4, m);
        const ax = snapAxis();
        addBox(px, py + 2.0, pz, ax ? 0.35 : 1.2, 3.6, ax ? 1.2 : 0.35, m);
        for (let i = 0; i < 5; i++) {
          for (const s of [-0.33, 0.33]) {
            addBox(px + (ax ? s : 0), py + 0.7 + i * 0.65, pz + (ax ? 0 : s), ax ? 0.3 : 0.9, 0.12, ax ? 0.9 : 0.3, m);
          }
        }
        py += 4.0; mark();
      },
      function tunnel(m, t) { // a low crawl-box — swing through, no standing
        heading += (rnd() - 0.5) * 0.8;
        const ax = snapAxis(), sg = snapSign(ax), L = 3.6;
        py += 0.5;
        const cx2 = px + (ax ? sg * L / 2 : 0), cz2 = pz + (ax ? 0 : sg * L / 2);
        addBox(cx2, py, cz2, ax ? L : 1.2, 0.3, ax ? 1.2 : L, m);                        // floor
        addBox(cx2, py + 1.65, cz2, ax ? L : 1.2, 0.3, ax ? 1.2 : L, m);                 // low ceiling
        addBox(cx2 + (ax ? 0 : 0.72), py + 0.85, cz2 + (ax ? 0.72 : 0), ax ? L : 0.25, 1.1, ax ? 0.25 : L, m);
        addBox(cx2 - (ax ? 0 : 0.72), py + 0.85, cz2 - (ax ? 0.72 : 0), ax ? L : 0.25, 1.1, ax ? 0.25 : L, m);
        px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
      },
      function stilts(m, t) { // hop the tops of towering thin poles
        for (let i = 0; i < 3; i++) {
          step(0.4, 0.6, 1.3, 1.6);
          addBox(px, py - 2.4, pz, 0.42, 5.0, 0.42, m);
          addBox(px, py + 0.15, pz, 0.6, 0.3, 0.6, m);
        }
      },
      function barSwing(m, t) { // bar, platform, bar, platform — mixed swinging
        for (let c = 0; c < 2; c++) {
          const baseY = py;
          heading += (rnd() - 0.5) * 0.5;
          px += Math.cos(heading) * 1.05; pz += Math.sin(heading) * 1.05;
          addBox(px, baseY + 2.15, pz, 0.7, 0.18, 0.7, m);
          heading += (rnd() - 0.5) * 0.5;
          px += Math.cos(heading) * 1.15; pz += Math.sin(heading) * 1.15;
          py = baseY + 0.85;
          addBox(px, py, pz, 1.0, 0.35, 1.0, m); mark();
        }
      },
      function bigLift(m, t) { // one huge fast elevator — time your board
        step(0.5, 0.7, 1.3, 1.5); addBox(px, py, pz, 1.2, 0.4, 1.2, m);
        step(0.3, 0.5, 1.4, 1.6);
        addMover(px, py + 2.0, pz, 1.3, 0.4, 1.3, m, 0, 2.4, 0, 0.7);
        py += 4.6; mark();
        step(0.1, 0.3, 1.3, 1.5); addBox(px, py, pz, 1.2, 0.4, 1.2, m);
      },
      function shelves(m, t) { // staggered shelf ledges up a sheer wall
        step(0.7, 0.9, 1.2, 1.5);
        const ax = snapAxis();
        addBox(px, py + 2.4, pz, ax ? 0.4 : 1.4, 4.4, ax ? 1.4 : 0.4, m);
        for (let i = 0; i < 4; i++) {
          const s = i % 2 ? 0.55 : -0.55;
          addBox(px + (ax ? (i % 2 ? 0.45 : -0.45) : s), py + 0.7 + i * 1.0, pz + (ax ? s : (i % 2 ? 0.45 : -0.45)), 0.5, 0.18, 0.5, m);
        }
        py += 4.7; mark();
      },
      function twinIsles(m, t) { // two huge islands, one lonely pebble between
        step(0.8, 1.0, 1.6, 1.8); addBox(px, py, pz, 3.6, 0.5, 3.6, m);
        step(0.6, 0.8, 2.3, 2.5); addBox(px, py, pz, 0.5, 0.3, 0.5, m);
        step(0.6, 0.8, 2.3, 2.5); addBox(px, py, pz, 3.6, 0.5, 3.6, m);
      },
      function cornerBeams(m, t) { // two long beams meeting at a right angle
        for (let j = 0; j < 2; j++) {
          if (j === 1) heading += Math.PI / 2;
          const ax = snapAxis(), sg = snapSign(ax), L = 3.2;
          py += 0.55;
          addBox(px + (ax ? sg * L / 2 : 0), py, pz + (ax ? 0 : sg * L / 2), ax ? L : 0.4, 0.3, ax ? 0.4 : L, m);
          px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
        }
      }
    ];

    // ---- 6 one-off signature levels ----
    function sigGreatWall(t) { // one 7m mega-wall, studded both faces
      step(0.9, 1.0, 1.3, 1.5);
      addBox(px, py, pz, 2.6, 0.5, 2.6, matStorm);
      const ax = snapAxis();
      addBox(px, py + 3.9, pz, ax ? 0.6 : 4.2, 7.0, ax ? 4.2 : 0.6, matStorm);
      for (let i = 0; i < 5; i++) {
        const lat = i % 2 ? 0.95 : -0.95;
        for (const side of [-0.5, 0.5]) {
          addBox(px + (ax ? side : lat), py + 1.1 + i * 1.25, pz + (ax ? lat : side), 0.35, 0.28, 0.35, matHoney);
        }
      }
      py += 7.7; mark();
    }
    function sigElevatorShaft(t) { // three giant slow lifts
      step(0.9, 1.0, 1.3, 1.5);
      addBox(px, py, pz, 2.2, 0.5, 2.2, matCopper);
      for (let i = 0; i < 3; i++) {
        step(0.2, 0.4, 1.4, 1.7);
        addMover(px, py + 1.8, pz, 1.6, 0.4, 1.6, matCopper, 0, 2.2, 0, 0.45, i * 2.1);
        py += 4.2; mark();
        step(0.2, 0.4, 1.3, 1.6);
        addBox(px, py, pz, 1.4, 0.4, 1.4, matSlate);
      }
    }
    function sigMaze(t) { // a walled maze floor with a corner exit tower
      step(0.9, 1.0, 1.3, 1.5);
      addBox(px, py, pz, 6, 0.5, 6, matSand);
      const fy = py + 0.25;
      addBox(px - 1.0, fy + 0.9, pz - 1.5, 4.0, 1.8, 0.3, matSand);
      addBox(px + 1.0, fy + 0.9, pz,       4.0, 1.8, 0.3, matSand);
      addBox(px - 1.0, fy + 0.9, pz + 1.5, 4.0, 1.8, 0.3, matSand);
      addBox(px + 2.4, fy + 0.7, pz + 2.4, 0.9, 1.4, 0.9, matHoney);
      px += 2.4; pz += 2.4; py = fy + 1.4; mark();
    }
    function sigAsteroidField(t) { // a cloud of rocks — many routes, one goal
      const bx = px, by = py, bz = pz;
      for (let i = 0; i < 6; i++) { step(0.9, 1.2, 1.0, 1.5); addBox(px, py, pz, 0.7 + rnd() * 0.4, 0.6, 0.7 + rnd() * 0.4, matRock2); }
      for (let i = 0; i < 10; i++) addBox(bx + (rnd() - 0.5) * 7, by + rnd() * (py - by), bz + (rnd() - 0.5) * 7, 0.6 + rnd() * 0.6, 0.6, 0.6 + rnd() * 0.6, matRock);
    }
    function sigVoidRope(t) { // one 12-meter tightrope over nothing
      heading += (rnd() - 0.5) * 1.0;
      const ax = snapAxis(), sg = snapSign(ax), L = 12;
      py += 0.8;
      addBox(px + (ax ? sg * L / 2 : 0), py, pz + (ax ? 0 : sg * L / 2), ax ? L : 0.4, 0.3, ax ? 0.4 : L, matObsidian);
      px += ax ? sg * L : 0; pz += ax ? 0 : sg * L; mark();
    }
    function sigFinalAscent(t) { // the last level before the summit
      SEG[9](matStar, 1);      // pebbles
      SEG[15](matObsidian, 1); // monkey bars
      SEG[12](matGold, 1);     // sliders
    }
    function sigSpire(t) { // one 12-meter pegged needle
      step(0.8, 1.0, 1.3, 1.5);
      addBox(px, py, pz, 2.0, 0.5, 2.0, matCrystal);
      addBox(px, py + 6.2, pz, 0.6, 12.0, 0.6, matCrystal);
      for (let i = 0; i < 10; i++) {
        const a = i * 1.4;
        addBox(px + Math.cos(a) * 0.52, py + 0.8 + i * 1.15, pz + Math.sin(a) * 0.52, 0.34, 0.24, 0.34, matStar);
      }
      py += 12.4; mark();
    }
    function sigGateGauntlet(t) { // sliding gates back to back to back
      SEG[36](matStorm, t);   // gates x2
      SEG[36](matSlate, t);   // gates x2 more
    }
    function sigLongRide(t) { // one ferry, twelve meters of nothing below
      step(0.6, 0.8, 1.2, 1.4);
      addBox(px, py, pz, 1.5, 0.4, 1.5, matCopper);
      heading += (rnd() - 0.5) * 0.6;
      const ax = Math.abs(Math.cos(heading)) > Math.abs(Math.sin(heading));
      const sg = ((ax ? Math.cos(heading) : Math.sin(heading)) >= 0 ? 1 : -1);
      const GAP = 12;
      addMover(px + (ax ? sg * GAP / 2 : 0), py + 0.5, pz + (ax ? 0 : sg * GAP / 2), 1.8, 0.4, 1.8, matCopper, ax ? 5.1 : 0, 0, ax ? 0 : 5.1, 0.25);
      px += ax ? sg * GAP : 0; pz += ax ? 0 : sg * GAP; py += 1.1;
      addBox(px, py, pz, 1.5, 0.4, 1.5, matCopper); mark();
    }
    function sigDarkMaze(t) { // the maze again — but obsidian, lit only by its exit
      step(0.9, 1.0, 1.3, 1.5);
      addBox(px, py, pz, 6, 0.5, 6, matObsidian);
      const fy = py + 0.25;
      addBox(px - 1.0, fy + 0.9, pz - 1.5, 4.0, 1.8, 0.3, matObsidian);
      addBox(px + 1.0, fy + 0.9, pz,       4.0, 1.8, 0.3, matObsidian);
      addBox(px - 1.0, fy + 0.9, pz + 1.5, 4.0, 1.8, 0.3, matObsidian);
      addBox(px + 2.4, fy + 0.7, pz + 2.4, 0.9, 1.4, 0.9, matStar);
      px += 2.4; pz += 2.4; py = fy + 1.4; mark();
    }
    function sigSkyLadder(t) { // three rung ladders stacked into the void
      SEG[42](matSnow, t);
      SEG[42](matIce, t);
      SEG[42](matStar, t);
    }
    function sigLeapOfFaith(t) { // a diving board, one huge falling leap, a net
      heading += (rnd() - 0.5) * 0.6;
      const ax = Math.abs(Math.cos(heading)) > Math.abs(Math.sin(heading));
      const sg = ((ax ? Math.cos(heading) : Math.sin(heading)) >= 0 ? 1 : -1);
      py += 0.6;
      addBox(px + (ax ? sg * 1.25 : 0), py, pz + (ax ? 0 : sg * 1.25), ax ? 2.5 : 0.5, 0.3, ax ? 0.5 : 2.5, matBeam2); // the board
      px += ax ? sg * 2.5 : 0; pz += ax ? 0 : sg * 2.5; mark();
      px += ax ? sg * 3.0 : 0; pz += ax ? 0 : sg * 3.0; py -= 1.5;                    // the leap
      addBox(px, py, pz, 3.2, 0.4, 3.2, matCloud); mark();                             // the net
      for (let i = 0; i < 3; i++) { step(0.7, 0.9, 1.0, 1.2); addBox(px, py, pz, 0.9, 0.3, 0.9, matCloud); }
    }
    const SIGNATURES = { 25: sigGreatWall, 50: sigElevatorShaft, 75: sigMaze, 100: sigAsteroidField,
                         125: sigVoidRope, 160: sigSpire, 190: sigGateGauntlet, 220: sigLongRide,
                         250: sigDarkMaze, 280: sigSkyLadder, 310: sigLeapOfFaith, 335: sigFinalAscent };

    // levels 1–199 (non-signature): a UNIQUE unordered PAIR of mechanics.
    // levels 200–335 (non-signature): a UNIQUE unordered TRIPLE — longer, harder,
    // and no combination in the whole game ever repeats.
    const pairs = [];
    for (let i = 0; i < SEG.length; i++) for (let j = i + 1; j < SEG.length; j++) pairs.push([i, j]);
    for (let i = pairs.length - 1; i > 0; i--) { // deterministic shuffle
      const k = Math.floor(rnd() * (i + 1));
      const tmp = pairs[i]; pairs[i] = pairs[k]; pairs[k] = tmp;
    }
    const triples = [];
    for (let i = 0; i < SEG.length; i++)
      for (let j = i + 1; j < SEG.length; j++)
        for (let k = j + 1; k < SEG.length; k++) triples.push([i, j, k]);
    for (let i = triples.length - 1; i > 0; i--) {
      const k = Math.floor(rnd() * (i + 1));
      const tmp = triples[i]; triples[i] = triples[k]; triples[k] = tmp;
    }

    const palette = [matRock, matRock2, matMoss, matWood, matSand, matIce, matMush, matLava,
                     matCloud, matCrystal, matStorm, matBeam2, matStar, matPink, matPurple,
                     matCopper, matEmerald, matObsidian, matSnow, matHoney, matCoral, matMint,
                     matSlate].concat(rainbowMats);

    let p = 0, tr = 0;
    for (let z = 0; z < 336; z++) {
      const t = Math.min(z / 40, 1); // difficulty ramps over the first 40 space levels
      if (SIGNATURES[z]) {
        SIGNATURES[z](t);
      } else if (z < 200) {
        const pr = pairs[p++];
        SEG[pr[0]](palette[(z * 7 + pr[0]) % palette.length], t);
        SEG[pr[1]](palette[(z * 13 + pr[1] + 5) % palette.length], t);
      } else {
        const tri = triples[tr++];
        SEG[tri[0]](palette[(z * 7 + tri[0]) % palette.length], t);
        SEG[tri[1]](palette[(z * 13 + tri[1] + 5) % palette.length], t);
        SEG[tri[2]](palette[(z * 17 + tri[2] + 11) % palette.length], t);
      }
      // rest platform between levels
      step(1.1, 1.3, 1.0, 1.5);
      addBox(px, py, pz, 2.0, 0.45, 2.0, matMoss);
    }
  }

  // ============ SUMMIT ============
  py += 1.6;
  const TOP_Y = py;
  addBox(px, TOP_Y, pz, 3.4, 0.5, 3.4, matGold);

  // summit sign
  {
    const cvs = document.createElement('canvas');
    cvs.width = 512; cvs.height = 192;
    const g = cvs.getContext('2d');
    g.fillStyle = '#123c26'; g.fillRect(0, 0, 512, 192);
    g.strokeStyle = '#ffd23f'; g.lineWidth = 10; g.strokeRect(8, 8, 496, 176);
    g.fillStyle = '#ffd23f'; g.font = 'bold 72px Trebuchet MS'; g.textAlign = 'center';
    g.fillText('YOU MADE IT', 256, 118);
    const sign = new THREE.Mesh(
      new THREE.PlaneGeometry(2.4, 0.9),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cvs), side: THREE.DoubleSide })
    );
    sign.position.set(px, TOP_Y + 1.8, pz);
    scene.add(sign);
    sign.onBeforeRender = () => { sign.rotation.y += 0.004; };
  }

  // ---------- floating decor: drifting rocks + far islands (no collision, no NPCs) ----------
  const floaters = [];
  for (let i = 0; i < 260; i++) {
    const p = pathPts[Math.floor(rnd() * pathPts.length)];
    const a = rnd() * Math.PI * 2;
    const r = 6 + rnd() * 10;
    const s = 0.4 + rnd() * 1.8;
    const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(s, 0), i % 2 ? matRock : matRock2);
    rock.position.set(p.x + Math.cos(a) * r, p.y + (rnd() - 0.5) * 5, p.z + Math.sin(a) * r);
    rock.rotation.set(rnd() * 3, rnd() * 3, rnd() * 3);
    scene.add(rock);
    floaters.push({ m: rock, base: rock.position.y, ph: rnd() * 6.28, sp: 0.3 + rnd() * 0.5 });
  }
  // big far-off islands with a tree on top
  for (let i = 0; i < 30; i++) {
    const p = pathPts[Math.floor(rnd() * pathPts.length)];
    const a = rnd() * Math.PI * 2;
    const r = 14 + rnd() * 8;
    const ix = p.x + Math.cos(a) * r, iy = p.y + (rnd() - 0.5) * 6, iz = p.z + Math.sin(a) * r;
    const island = new THREE.Group();
    const top = new THREE.Mesh(new THREE.BoxGeometry(5, 0.8, 5), matMoss);
    const under = new THREE.Mesh(new THREE.ConeGeometry(3.4, 4.5, 6), matRock2);
    under.rotation.x = Math.PI; under.position.y = -2.6;
    const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3.4, 6), trunkMat);
    tr.position.y = 2.1;
    const cr = new THREE.Mesh(new THREE.ConeGeometry(2.0, 3.4, 7), leafMat);
    cr.position.y = 4.6;
    island.add(top, under, tr, cr);
    island.position.set(ix, iy, iz);
    scene.add(island);
    floaters.push({ m: island, base: iy, ph: rnd() * 6.28, sp: 0.2 + rnd() * 0.25 });
  }

  // ground ring of jungle trees
  for (let i = 0; i < 26; i++) {
    const a = (i / 26) * Math.PI * 2;
    const r = 22 + (i * 7919 % 14);
    const tx = Math.cos(a) * r, tz = Math.sin(a) * r;
    const th = 5 + (i * 104729 % 6);
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.5, th, 6), trunkMat);
    trunk.position.set(tx, th / 2, tz);
    const crown = new THREE.Mesh(new THREE.ConeGeometry(2.6, 4.5, 7), leafMat);
    crown.position.set(tx, th + 1.6, tz);
    scene.add(trunk, crown);
  }

  // bake all static platforms into one merged mesh per material (huge perf win)
  buildStaticMeshes();

  // ---------- SPACE VISUALS ----------
  // The space look belongs to the space MAP now, not to altitude:
  // purple void, stars out, sun dimmed, every platform glowing.
  const skyCol = new THREE.Color(0x87c5e8);
  const spaceCol = new THREE.Color(0x241048);

  // star field rides with the player like a distant sky sphere
  const starMat = new THREE.PointsMaterial({
    color: 0xffffff, size: 1.4, transparent: true, opacity: 0,
    sizeAttenuation: true, depthWrite: false
  });
  {
    const N = 900;
    const pos = new Float32Array(N * 3);
    for (let i = 0; i < N; i++) {
      // random direction, pushed out to a far shell
      let vx = rnd() * 2 - 1, vy = rnd() * 2 - 1, vz = rnd() * 2 - 1;
      const len = Math.sqrt(vx * vx + vy * vy + vz * vz) || 1;
      const R = 90 + rnd() * 60;
      pos[i * 3] = vx / len * R; pos[i * 3 + 1] = vy / len * R; pos[i * 3 + 2] = vz / len * R;
    }
    const starGeo = new THREE.BufferGeometry();
    starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

  function closestPointOnBox(p, box, out) {
    out.set(
      Math.max(box.min.x, Math.min(p.x, box.max.x)),
      Math.max(box.min.y, Math.min(p.y, box.max.y)),
      Math.max(box.min.z, Math.min(p.z, box.max.z))

  const _cp = new THREE.Vector3();

  function sphereHit(worldPos, r) {
    // round pillar (exact cylinder, no square corners)

      const cy = Math.max(PILLAR.y0, Math.min(worldPos.y, PILLAR.y1));
      const pr = pillarRadiusAt(cy);
      const dr = Math.hypot(worldPos.x, worldPos.z);
      if (dr > pr) {
        // outside the surface: closest point is on the wall (or its rim)
        _cp.set(worldPos.x / dr * pr, cy, worldPos.z / dr * pr);
        _n.subVectors(worldPos, _cp);
        const d = _n.length();
        if (d < r) {
          _n.divideScalar(d || 1);
          return { normal: _n.clone(), depth: r - d };
        }
      } else if (worldPos.y > PILLAR.y1) {
        // above the top cap, within its radius
        const d = worldPos.y - PILLAR.y1;
        if (d < r) return { normal: new THREE.Vector3(0, 1, 0), depth: r - d };
      } else {
        // inside the stone: push straight out
        const nd = dr || 1e-4;
        _n.set(worldPos.x / nd, 0, worldPos.z / nd);
        return { normal: _n.clone(), depth: (pr - dr) + r };
      }

      closestPointOnBox(worldPos, colliders[i], _cp);

      const d = _n.length();
      if (d < r) {
        if (d < 1e-5) { _n.set(0, 1, 0); } else { _n.divideScalar(d); }
        return { normal: _n.clone(), depth: r - d, mover: colliders[i].mover || null };
      }

  function respawnIfFallen() {
    if (inSpace) {
      // no mercy: fall off the space map and you're back at the very bottom of the jungle
      if (rig.position.y < 5) {

  // ---------- VR update: gorilla locomotion ----------
  const _local = new THREE.Vector3();
  const _world = new THREE.Vector3();
  const _delta = new THREE.Vector3();
  const _push = new THREE.Vector3();
  const _headW = new THREE.Vector3();

  function updateVR(dt) {
    let touching = 0;
    let ride = null;
    _delta.set(0, 0, 0);
    _push.set(0, 0, 0);

    for (let ci = 0; ci < controllers.length; ci++) {
      const h = controllers[ci];
      // gorilla arms: stretch the hand outward from the head so knuckles reach the ground
      _local.copy(h.ctrl.position).sub(camera.position).multiplyScalar(ARM_SCALE).add(camera.position);
      h.ball.position.copy(_local);
      h.ball.quaternion.copy(h.ctrl.quaternion); // twist the controller, the pixel sphere spins with it
      _world.copy(_local).add(rig.position);
      const hit = sphereHit(_world, HAND_R);
      if (hit && h.prev) {
        touching++;
        const speed = _local.distanceTo(h.prev) / Math.max(dt, 1 / 120);
        // play a slap only on a REAL fresh contact:
        // hand must have been off the surface for a moment (kills contact jitter),
        // cooldown must be over (caps the rate), and the hand must actually be moving
        if (!h.wasTouching && h.offTime > 0.1 && h.cool <= 0 && speed > 0.35) {
          playHit(Math.min(speed, 4));
          pulseHaptic(ci, Math.min(speed, 4)); // rumble the hand that hit
          h.cool = 0.15;

        h.offTime = 0;
        if (hit.mover) ride = hit.mover;
        // pin the hand: move the body opposite to hand movement
        _delta.add(_local.clone().sub(h.prev));
        _push.add(hit.normal.multiplyScalar(hit.depth));
      } else {
        h.offTime += dt;
      }
      if (h.cool > 0) h.cool -= dt;
      h.wasTouching = !!hit;
      h.prev = h.prev || new THREE.Vector3();
      h.prev.copy(_local);
    }

    if (touching > 0) {
      _delta.divideScalar(touching);
      rig.position.sub(_delta);       // stick to the wall
      rig.position.add(_push);        // resolve penetration
      velocity.copy(_delta).multiplyScalar(-1 / Math.max(dt, 1 / 120));
      if (velocity.length() > MAX_SPEED) velocity.setLength(MAX_SPEED);
    } else {
      // hands hold you up; gravity is lighter on the space map
      velocity.y -= grav() * dt;
      if (velocity.length() > MAX_SPEED * 1.4) velocity.setLength(MAX_SPEED * 1.4);
      rig.position.addScaledVector(velocity, dt);
    }
    // sticky riding: while a hand is on a mover you travel with it, and for a
    // grace window after contact flickers you STILL travel with it — the
    // platform can never slide out from under you between grabs. Only after
    // you've truly left it (grace expired) do you inherit its momentum.
    if (ride) {
      rig.position.add(ride.delta);
      rideMover = ride;
      rideGrace = 0.25;
    } else if (rideMover) {
      rideGrace -= dt;
      if (rideGrace > 0) {
        rig.position.add(rideMover.delta); // still riding through the flicker
      } else {
        if (velocity.length() >= 3) {
          velocity.addScaledVector(rideMover.delta, 0.9 / Math.max(dt, 1 / 120)); // carry its speed with you
        }

      rig.position.addScaledVector(hh.normal, hh.depth);

      if (into < 0) velocity.addScaledVector(hh.normal, -into);

  // ---------- pause (Y = settings, B = plain pause) ----------
  let paused = false;
  let yWas = false, bWas = false, stickCentered = true;
  function togglePause() {
    paused = !paused;
    for (const h of controllers) {
      if (paused) {
        rig.remove(h.ball);      // ball hands deleted
        h.ctrl.add(h.model);     // cubes appear in your hands
      } else {
        h.ctrl.remove(h.model);  // cubes deleted
        rig.add(h.ball);         // ball hands return
      }
    }
    if (!paused) {
      // wipe stale hand history so unpausing can't fling you
      controllers.forEach(c => { c.prev = null; c.wasTouching = false; });
    }
  }
  function pollPauseButtons() {
    const session = renderer.xr.getSession && renderer.xr.getSession();
    if (!session || !session.inputSources) return;
    let y = false, b = false, stickX = 0;
    for (const src of session.inputSources) {
      const gp = src.gamepad;
      if (!gp) continue;
      // buttons[5] is Y on the left controller, B on the right
      if (gp.buttons && gp.buttons.length > 5 && gp.buttons[5].pressed) {
        if (src.handedness === 'left') y = true; else b = true;
      }
      if (settingsOpen && gp.axes && gp.axes.length > 2 && Math.abs(gp.axes[2]) > Math.abs(stickX)) stickX = gp.axes[2];
    }

    else if (b && !bWas) { if (settingsOpen) setSettings(false); else togglePause(); }
    yWas = y; bWas = b;
    // volume slider: flick the stick, hear a preview at the new volume.
    // "glitch": one step above 100% is the 1,000 option — it does NOT preview.
    if (settingsOpen) {
      if (stickCentered && Math.abs(stickX) > 0.6) {
        if (stickX > 0) {
          if (masterVolume === 1) masterVolume = 1000;
          else if (masterVolume < 1) masterVolume = Math.round((masterVolume + 0.1) * 10) / 10;
        } else {
          if (masterVolume === 1000) masterVolume = 1;
          else masterVolume = Math.max(0, Math.round((masterVolume - 0.1) * 10) / 10);
        }
        drawSettings();
        saveSettings();
        if (masterVolume !== 1000) playHit(2); // 1,000 never previews
        stickCentered = false;
      } else if (Math.abs(stickX) < 0.3) {
        stickCentered = true;
      }
    }
  }

  // ---------- main loop ----------
  const clock = new THREE.Clock();
  let gameT = 0; // game time stands still while paused, so movers resume exactly where they froze
  renderer.setAnimationLoop(() => {
    const dt = Math.min(clock.getDelta(), 0.05);
    if (renderer.xr.isPresenting) pollPauseButtons();
    if (renderer.xr.isPresenting && settingsOpen) updateSettingsPointer();
    if (renderer.xr.isPresenting && settingsOpen) updateSettingsPointer();
    if (renderer.xr.isPresenting && settingsOpen) updateSettingsPointer();
    if (!paused) {
      gameT += dt;
      updateMovers(gameT);
      updateTeleport(dt);
      // the space look belongs to the space map
      const sfTarget = inSpace ? 1 : 0;
      spaceF += (sfTarget - spaceF) * Math.min(dt * 2.5, 1);
      if (Math.abs(spaceF - lastSpaceF) > 0.003) { applySpace(spaceF); lastSpaceF = spaceF; }
      if (renderer.xr.isPresenting && !tp) { checkShipTrigger(); updateVR(dt); }
      else if (!renderer.xr.isPresenting) {
        // no menus, no modes: while waiting for VR, the camera slowly circles the tower
        const a = gameT * 0.06;
        camera.position.set(Math.cos(a) * 13 - rig.position.x,
                            6 - rig.position.y,
                            Math.sin(a) * 13 - rig.position.z);
        camera.lookAt(0, 5, 0);
      }
      // gentle bobbing of the floating decor
      for (const f of floaters) {
        f.m.position.y = f.base + Math.sin(gameT * f.sp + f.ph) * 0.4;
        f.m.rotation.y += dt * 0.05;
      }
      // splash fade-out
      if (splashT > 0) {
        splashT -= dt;
        if (splashT < 1.2) splashMat.opacity = Math.max(splashT / 1.2, 0);
        if (splashT <= 0) camera.remove(splash);
      }
    }
    renderer.render(scene, camera);
  });

  // ---------- launch (called by the bootstrap once WebXR is granted) ----------
  window.__vuLaunch = function (session) {
    initAudio();
    renderer.xr.setReferenceSpaceType('local-floor');
    renderer.xr.setSession(session);
    camera.position.set(0, 0, 0); // hand control back to the headset
    showSplash();
    // Meta menu opens -> auto-pause. Menu closes -> resume with hand history
    // wiped, so exiting the menu can never fling you off the map.
    let autoPaused = false;
    session.addEventListener('visibilitychange', () => {
      if (session.visibilityState !== 'visible') {
        if (!paused) { autoPaused = true; togglePause(); }
      } else {
        controllers.forEach(c => { c.prev = null; c.wasTouching = false; });
        if (autoPaused) { autoPaused = false; togglePause(); }
      }
    });
    session.addEventListener('end', () => {
      if (settingsOpen) setSettings(false);
      else if (paused) togglePause(); // clean up cube hands
      controllers.forEach(c => c.prev = null);
      if (window.__vuShowStart) window.__vuShowStart();
    });
  };
})();
</script>
<script>
// bootstrap — the only code that runs when the website opens. The 3D engine and
// the game are loaded only after the user clicks Start VR.
(function () {
  function showError(msg) {
    let bar = document.getElementById('errbar');
    if (!bar) {
      bar = document.createElement('div');
      bar.id = 'errbar';
      bar.style.cssText = 'position:fixed;left:0;right:0;top:0;z-index:99;background:#7a1020;color:#fff;font:13px monospace;padding:8px 12px;white-space:pre-wrap;';
      document.body.appendChild(bar);
    }
    bar.textContent = 'Game error: ' + msg;
  }
  window.addEventListener('error', function (e) { showError(e.message || 'unknown script error'); });
  const page = document.getElementById('startpage');
  const btn = document.getElementById('startvr');
  window.__vuShowStart = function () { page.style.display = 'flex'; };
  let launching = false;
  btn.addEventListener('click', function () {
    if (launching) return;
    if (!navigator.xr) { btn.textContent = 'VR not available on this device'; return; }
    launching = true;
    btn.textContent = 'Starting…';
    navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] })
      .then(function (session) {
        function boot() {
          try {
            if (!window.__vuLaunch) (0, eval)(document.getElementById('gamecode').textContent); // build the game NOW
            window.__vuLaunch(session);
            page.style.display = 'none';
            btn.textContent = 'Start VR';
          } catch (e) { showError(e.message); }
          launching = false;
        }
        if (window.THREE) { boot(); return; }
        const s = document.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = boot;
        s.onerror = function () {
          launching = false;
          btn.textContent = 'Start VR';
          showError('the 3D engine failed to download — check your internet and try again');
          session.end();
        };
        document.head.appendChild(s);
      })
      .catch(function () { launching = false; btn.textContent = 'VR not available on this device'; });
  });
})();
</script>
